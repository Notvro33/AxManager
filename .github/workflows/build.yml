name: Android CI/CD Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Compile & Package APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Setup Gradle 9.3.1
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'
        validate-wrappers: false

    - name: Create empty .env if not exists
      run: |
        touch .env

    - name: Assemble Debug APK
      run: gradle assembleDebug --no-daemon

    - name: Upload Compiled Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AxManager-Debug-APK
        path: manager/build/outputs/apk/debug/*.apk
        retention-days: 7
